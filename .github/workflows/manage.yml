name: 관리 (시작·중지·시드·보정·계좌)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "작업"
        type: choice
        required: true
        options: [start, stop, resume, seed, fix, status, addaccount, delaccount, chatid]
      account:
        description: "계좌 (기본: main / addaccount일 땐 새 계좌 이름)"
        required: false
        default: "main"
      ticker:
        description: "종목"
        type: choice
        required: false
        options: [TQQQ, SOXL]
      value1:
        description: "시드$(start/seed) · 수량(fix) · chat_id(addaccount/chatid)"
        required: false
        default: ""
      value2:
        description: "평단가$ (fix 전용)"
        required: false
        default: ""
      version:
        description: "버전 (start 전용)"
        type: choice
        required: false
        options: ["v2.2", "v3.0"]

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 명령 적용
        run: |
          case "${{ inputs.action }}" in
            start)      CMD="start ${{ inputs.account }} ${{ inputs.ticker }} ${{ inputs.value1 }} ${{ inputs.version }}";;
            stop)       CMD="stop ${{ inputs.account }} ${{ inputs.ticker }}";;
            resume)     CMD="resume ${{ inputs.account }} ${{ inputs.ticker }}";;
            seed)       CMD="seed ${{ inputs.account }} ${{ inputs.ticker }} ${{ inputs.value1 }}";;
            fix)        CMD="fix ${{ inputs.account }} ${{ inputs.ticker }} ${{ inputs.value1 }} ${{ inputs.value2 }}";;
            addaccount) CMD="addaccount ${{ inputs.account }} ${{ inputs.value1 }}";;
            delaccount) CMD="delaccount ${{ inputs.account }}";;
            chatid)     CMD="chatid ${{ inputs.account }} ${{ inputs.value1 }}";;
            status)     CMD="status";;
          esac
          echo "실행: $CMD"
          python bot/manage.py $CMD

      - name: 즉시 가이드 재계산 + 텔레그램 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot/daily.py

      - name: 상태 저장(커밋)
        run: |
          git config user.name "infinite-buying-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/
          git diff --cached --quiet || git commit -m "chore: manage ${{ inputs.action }} ${{ inputs.account }} ${{ inputs.ticker }}"
          git push
