name: 무한매수법 데일리 가이드

on:
  schedule:
    # 매주 화~토 07:10 KST (= 월~금 22:10 UTC, 미국장 마감 후)
    - cron: "10 22 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 봇 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot/daily.py

      - name: 상태 저장(커밋)
        run: |
          git config user.name "infinite-buying-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily state update"
          git push
